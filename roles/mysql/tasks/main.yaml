    - name: installing mysql server
      ansible.builtin.dnf:
        name: mysql
        state: installed

    - name: enable and start mysql server
      ansible.builtin.service:
        name: mysql
        state: started
        enabled: yes

    - name: setup the mysql root password
      ansible.builtin.command: mysql_secure_installation --set-root-pass RoboShop@1
