    - name: install maven and mysql server
      ansible.builtin.dnf:
        name: "{{ item }}"
        state: installed
      loop:
      - maven
      - mysql

    - name: install pymysql and cryptograpy
      ansible.builtin.pip:
        name: "{{ item }}"
        executable: pip3.9
      loop:
      - cryptograpy
      - pymysql

    - name: install maven dependencies
      ansible.builtin.command: mvn clean package 
      args:
        chdir: /app

    - name: rename jar file
      ansible.builtin.command: mv target/{{ component }}-1.0.jar {{ component }}.jar
      args:
        chdir: /app